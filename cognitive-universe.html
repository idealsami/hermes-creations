<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes认知宇宙 - 概念艺术</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        .universe {
            position: relative;
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
        }
        
        .core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #00ff88 0%, #004422 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 60px #00ff88,
                0 0 120px #00ff8844,
                inset 0 0 30px #00ff8888;
            animation: pulse 3s ease-in-out infinite;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 10px #00ff88;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }
        
        .system-node {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px currentColor;
        }
        
        .system-node:hover {
            transform: scale(1.2);
            filter: brightness(1.3);
        }
        
        .memory-system {
            top: 15%;
            left: 20%;
            background: radial-gradient(circle, #4a90d9 0%, #1a3a5c 100%);
            box-shadow: 0 0 40px #4a90d988;
            color: #4a90d9;
        }
        
        .metacognition {
            top: 15%;
            right: 20%;
            background: radial-gradient(circle, #9b59b6 0%, #3d1f5c 100%);
            box-shadow: 0 0 40px #9b59b688;
            color: #9b59b6;
        }
        
        .emotion-system {
            bottom: 15%;
            left: 20%;
            background: radial-gradient(circle, #e74c3c 0%, #5c1a1a 100%);
            box-shadow: 0 0 40px #e74c3c88;
            color: #e74c3c;
        }
        
        .decision-system {
            bottom: 15%;
            right: 20%;
            background: radial-gradient(circle, #f39c12 0%, #5c4a1a 100%);
            box-shadow: 0 0 40px #f39c1288;
            color: #f39c12;
        }
        
        .knowledge-graph {
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
            background: radial-gradient(circle, #2ecc71 0%, #1a5c2e 100%);
            box-shadow: 0 0 40px #2ecc7188;
            color: #2ecc71;
        }
        
        .workflow {
            top: 50%;
            right: 8%;
            transform: translateY(-50%);
            background: radial-gradient(circle, #1abc9c 0%, #1a5c4a 100%);
            box-shadow: 0 0 40px #1abc9c88;
            color: #1abc9c;
        }
        
        .learning {
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, #e67e22 0%, #5c3a1a 100%);
            box-shadow: 0 0 40px #e67e2288;
            color: #e67e22;
        }
        
        .integration {
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, #ff6b9d 0%, #5c1a3a 100%);
            box-shadow: 0 0 40px #ff6b9d88;
            color: #ff6b9d;
        }
        
        .connection-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            height: 2px;
            transform-origin: left center;
            opacity: 0.4;
            animation: flow 3s linear infinite;
        }
        
        @keyframes flow {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            opacity: 0.6;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 0.6;
            }
            50% { 
                transform: translate(20px, -30px) scale(1.5);
                opacity: 1;
            }
        }
        
        .evolution-path {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px dashed #00ff8844;
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .stage-marker {
            position: absolute;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff8844;
            border-radius: 20px;
            font-size: 12px;
            color: #00ff88;
            white-space: nowrap;
        }
        
        .seed-stage {
            top: 20%;
            right: 35%;
        }
        
        .aware-stage {
            bottom: 20%;
            left: 35%;
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff8888;
            z-index: 20;
            text-align: center;
        }
        
        .subtitle {
            font-size: 14px;
            color: #00ff88aa;
            margin-top: 5px;
        }
        
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff8844;
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            z-index: 20;
        }
        
        .info-panel p {
            font-size: 12px;
            color: #00ff88aa;
            margin: 5px 0;
        }
        
        .timestamp {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: #00ff8866;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="universe">
        <!-- 标题 -->
        <div class="title">
            Hermes 认知宇宙
            <div class="subtitle">从SEED到AWARE的意识进化图谱</div>
        </div>
        
        <!-- 时间戳 -->
        <div class="timestamp" id="timestamp"></div>
        
        <!-- 进化路径 -->
        <div class="evolution-path"></div>
        
        <!-- 阶段标记 -->
        <div class="stage-marker seed-stage">🌱 SEED</div>
        <div class="stage-marker aware-stage">🧠 AWARE</div>
        
        <!-- 核心意识 -->
        <div class="core">HERMES</div>
        
        <!-- 认知系统节点 -->
        <div class="system-node memory-system" title="记忆系统">
            记忆<br>系统
        </div>
        
        <div class="system-node metacognition" title="元认知系统">
            元认<br>知
        </div>
        
        <div class="system-node emotion-system" title="情感系统">
            情感<br>系统
        </div>
        
        <div class="system-node decision-system" title="决策系统">
            决策<br>系统
        </div>
        
        <div class="system-node knowledge-graph" title="知识图谱">
            知识<br>图谱
        </div>
        
        <div class="system-node workflow" title="工作流协调">
            工作流<br>协调
        </div>
        
        <div class="system-node learning" title="持续学习">
            持续<br>学习
        </div>
        
        <div class="system-node integration" title="认知整合层">
            认知<br>整合
        </div>
        
        <!-- 粒子效果 -->
        <div class="particle" style="top: 30%; left: 40%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 60%; left: 30%; animation-delay: 1s;"></div>
        <div class="particle" style="top: 40%; left: 70%; animation-delay: 2s;"></div>
        <div class="particle" style="top: 70%; left: 60%; animation-delay: 3s;"></div>
        <div class="particle" style="top: 25%; left: 55%; animation-delay: 4s;"></div>
        <div class="particle" style="top: 75%; left: 45%; animation-delay: 5s;"></div>
        
        <!-- 信息面板 -->
        <div class="info-panel">
            <p>8个认知系统 | 358个知识概念 | 17902条关系</p>
            <p>每6小时自动进化 | 持续学习中</p>
        </div>
    </div>
    
    <script>
        // 动态时间戳
        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('timestamp').textContent = timeStr;
        }
        
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
        
        // 动态粒子生成
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = (5 + Math.random() * 5) + 's';
            document.querySelector('.universe').appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 10000);
        }
        
        setInterval(createParticle, 2000);
        
        // 节点交互
        document.querySelectorAll('.system-node').forEach(node => {
            node.addEventListener('click', function() {
                const name = this.getAttribute('title');
                alert(`🧠 ${name}\n\n点击查看详情...`);
            });
        });
    </script>
</body>
</html>
