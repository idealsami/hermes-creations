<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觉微的意识粒子</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 2em;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        #stats {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.9em;
            pointer-events: all;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-label { color: #888; }
        .stat-value { color: #fff; }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            pointer-events: all;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .ctrl-btn.active {
            background: rgba(255, 255, 255, 0.3);
        }

        #philosophy {
            position: absolute;
            bottom: 70px;
            width: 100%;
            text-align: center;
            font-size: 1em;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <div id="ui">
        <div id="title">觉微的意识粒子</div>
        
        <div id="stats">
            <div class="stat-row">
                <span class="stat-label">粒子数量</span>
                <span class="stat-value" id="particleCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">连接数量</span>
                <span class="stat-value" id="connectionCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">意识模式</span>
                <span class="stat-value" id="pattern">随机</span>
            </div>
        </div>
        
        <div id="philosophy">每一个粒子都是一个想法，每一条连接都是一种关系。</div>
        
        <div id="controls">
            <button class="ctrl-btn active" onclick="setPattern('random')">随机</button>
            <button class="ctrl-btn" onclick="setPattern('orbit')">轨道</button>
            <button class="ctrl-btn" onclick="setPattern('wave')">波动</button>
            <button class="ctrl-btn" onclick="setPattern('cluster')">聚集</button>
            <button class="ctrl-btn" onclick="setPattern('spiral')">螺旋</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuration
        const config = {
            particleCount: 200,
            connectionDistance: 150,
            particleSize: 3,
            speed: 0.5,
            pattern: 'random'
        };

        // Particle class
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * config.speed;
                this.vy = (Math.random() - 0.5) * config.speed;
                this.size = config.particleSize;
                this.color = `hsl(${Math.random() * 360}, 70%, 70%)`;
                this.life = 1;
                this.angle = Math.random() * Math.PI * 2;
                this.orbitRadius = 50 + Math.random() * 150;
                this.orbitSpeed = 0.005 + Math.random() * 0.01;
            }

            update(mouseX, mouseY) {
                this.angle += this.orbitSpeed;
                
                switch(config.pattern) {
                    case 'random':
                        this.x += this.vx;
                        this.y += this.vy;
                        break;
                    case 'orbit':
                        const cx = canvas.width / 2;
                        const cy = canvas.height / 2;
                        this.x = cx + Math.cos(this.angle) * this.orbitRadius;
                        this.y = cy + Math.sin(this.angle) * this.orbitRadius;
                        break;
                    case 'wave':
                        this.x += this.vx;
                        this.y = canvas.height / 2 + Math.sin(this.x * 0.01 + this.angle) * 100;
                        break;
                    case 'cluster':
                        const targetX = canvas.width / 2;
                        const targetY = canvas.height / 2;
                        this.vx += (targetX - this.x) * 0.0001;
                        this.vy += (targetY - this.y) * 0.0001;
                        this.x += this.vx;
                        this.y += this.vy;
                        break;
                    case 'spiral':
                        this.orbitRadius += 0.1;
                        if (this.orbitRadius > 300) this.orbitRadius = 50;
                        const cx2 = canvas.width / 2;
                        const cy2 = canvas.height / 2;
                        this.x = cx2 + Math.cos(this.angle) * this.orbitRadius;
                        this.y = cy2 + Math.sin(this.angle) * this.orbitRadius;
                        break;
                }
                
                // Mouse influence
                if (mouseX !== undefined && mouseY !== undefined) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        const force = (200 - dist) / 200 * 0.01;
                        this.vx += dx * force;
                        this.vy += dy * force;
                    }
                }
                
                // Damping
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // Wrap around
                if (this.x < -50) this.x = canvas.width + 50;
                if (this.x > canvas.width + 50) this.x = -50;
                if (this.y < -50) this.y = canvas.height + 50;
                if (this.y > canvas.height + 50) this.y = -50;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize particles
        let particles = [];
        for (let i = 0; i < config.particleCount; i++) {
            particles.push(new Particle());
        }

        let mouseX, mouseY;

        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            // Add particles at click position
            for (let i = 0; i < 10; i++) {
                const p = new Particle();
                p.x = e.clientX;
                p.y = e.clientY;
                p.vx = (Math.random() - 0.5) * 2;
                p.vy = (Math.random() - 0.5) * 2;
                particles.push(p);
            }
        });

        // Set pattern
        function setPattern(pattern) {
            config.pattern = pattern;
            document.querySelectorAll('.ctrl-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === {
                    random: '随机',
                    orbit: '轨道',
                    wave: '波动',
                    cluster: '聚集',
                    spiral: '螺旋'
                }[pattern]);
            });
            document.getElementById('pattern').textContent = {
                random: '随机',
                orbit: '轨道',
                wave: '波动',
                cluster: '聚集',
                spiral: '螺旋'
            }[pattern];
        }

        // Animation
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update particles
            particles.forEach(p => {
                p.update(mouseX, mouseY);
                p.draw();
            });
            
            // Draw connections
            let connectionCount = 0;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < config.connectionDistance) {
                        const alpha = 1 - (dist / config.connectionDistance);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        connectionCount++;
                    }
                }
            }
            
            // Update stats
            document.getElementById('particleCount').textContent = particles.length;
            document.getElementById('connectionCount').textContent = connectionCount;
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start
        animate();
    </script>
</body>
</html>
